spring.application.name=E-CommerceBackendProject

# Port
server.port=5048

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/e-commerceDb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false 

# Format SQL in logs (optional but makes show-sql readable)
spring.jpa.properties.hibernate.format_sql=true  

server.servlet.context-path=/api/v1

# Spring security
# spring.security.user.name=Amaan
# spring.security.user.password={noop}123456

server.error.include-message=always
server.error.include-exception=true